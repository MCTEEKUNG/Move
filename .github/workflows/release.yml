name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Windows build ───────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            netshare/target
          key: windows-cargo-${{ hashFiles('netshare/Cargo.lock') }}

      - name: Build release binaries
        working-directory: netshare
        run: cargo build --release -p netshare-gui

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item netshare\target\release\netshare-gui.exe dist\NetShare.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: netshare-windows
          path: dist/NetShare.exe

  # ─── Linux build + package ───────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libssl-dev \
            pkg-config \
            libx11-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxi-dev \
            libxtst-dev \
            fuse \
            libfuse2 \
            desktop-file-utils \
            libglib2.0-dev \
            libgtk-3-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            netshare/target
          key: linux-cargo-${{ hashFiles('netshare/Cargo.lock') }}

      - name: Build release binaries
        working-directory: netshare
        run: cargo build --release -p netshare-gui

      - name: Build .deb package
        run: |
          chmod +x packaging/make-deb.sh
          packaging/make-deb.sh

      - name: Build AppImage
        run: |
          chmod +x packaging/make-appimage.sh
          packaging/make-appimage.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netshare-linux
          path: |
            dist/*.deb
            dist/*.AppImage

  # ─── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/netshare-windows/NetShare.exe
            dist/netshare-linux/*.deb
            dist/netshare-linux/*.AppImage
          generate_release_notes: true
          draft: false
